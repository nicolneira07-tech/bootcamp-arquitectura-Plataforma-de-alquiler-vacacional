
openapi: 3.0.0
info:
  title: API Plataforma de Alquiler Vacacional
  version: 1.0.0
  description: API REST para gestión de propiedades con validación de licencias, control de días e incidencias.

servers:
  - url: http://localhost:3000

paths:
  /api/v1/properties:
    get:
      summary: Listar propiedades
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: location
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Lista de propiedades
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyListResponse'

    post:
      summary: Crear propiedad
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PropertyInput'
      responses:
        "201":
          description: Propiedad creada

  /api/v1/properties/{id}:
    get:
      summary: Obtener propiedad
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Propiedad encontrada
        "404":
          description: No encontrado

    put:
      summary: Actualizar propiedad completa

    patch:
      summary: Actualizar propiedad parcial

    delete:
      summary: Eliminar propiedad

  /api/v1/properties/{id}/license:
    post:
      summary: Crear licencia
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/License'
      responses:
        "201":
          description: Licencia creada

    get:
      summary: Obtener licencia
      responses:
        "200":
          description: Licencia encontrada

  /api/v1/properties/{id}/bookings:
    post:
      summary: Crear reserva (valida licencia y días)
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Booking'
      responses:
        "201":
          description: Reserva creada
        "400":
          description: Error de validación

    get:
      summary: Listar reservas
      responses:
        "200":
          description: Lista de reservas

  /api/v1/properties/{id}/incidents:
    post:
      summary: Crear incidencia
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Incident'
      responses:
        "201":
          description: Incidencia creada

    get:
      summary: Listar incidencias
      responses:
        "200":
          description: Lista de incidencias

components:
  schemas:

    Property:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        location:
          type: string
        pricePerNight:
          type: number
        maxDaysPerYear:
          type: integer

    PropertyInput:
      type: object
      required:
        - title
        - location
      properties:
        title:
          type: string
        location:
          type: string
        pricePerNight:
          type: number
        maxDaysPerYear:
          type: integer

    License:
      type: object
      properties:
        id:
          type: integer
        propertyId:
          type: integer
        number:
          type: string
        valid:
          type: boolean

    Booking:
      type: object
      properties:
        id:
          type: integer
        propertyId:
          type: integer
        guestName:
          type: string
        days:
          type: integer

    Incident:
      type: object
      properties:
        id:
          type: integer
        propertyId:
          type: integer
        description:
          type: string

    PropertyListResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/Property'
        meta:
          type: object
          properties:
            pagination:
              type: object
              properties:
                page:
                  type: integer
                limit:
                  type: integer
                total:
                  type: integer
                totalPages:
                  type: integer
        timestamp:
          type: string

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
        error:
          type: object
          properties:
            message:
              type: string
            statusCode:
              type: integer
        timestamp:
          type: string
