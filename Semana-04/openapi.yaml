openapi: 3.0.0
info:
  title: API Plataforma de Alquiler Vacacional
  description: API para la gestión de propiedades en una plataforma de alquiler vacacional
  version: 1.0.0

servers:
  - url: http://localhost:3000

tags:
  - name: Properties
    description: Gestión de propiedades

paths:
  /api/v1/properties:
    get:
      tags: [Properties]
      summary: Listar propiedades
      description: Permite obtener una lista de propiedades con paginación y filtros
      parameters:
        - name: page
          in: query
          description: Número de página
          schema:
            type: integer
            example: 1
        - name: limit
          in: query
          description: Cantidad de resultados por página
          schema:
            type: integer
            example: 10
      responses:
        '200':
          description: Lista de propiedades obtenida correctamente
          content:
            application/json:
              example:
                success: true
                data:
                  - id: 1
                    title: Casa en Cartagena
                    price: 300
        '500':
          description: Error del servidor

    post:
      tags: [Properties]
      summary: Crear propiedad
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PropertyInput'
      responses:
        '201':
          description: Propiedad creada correctamente
          content:
            application/json:
              example:
                success: true
                data:
                  id: 1
                  title: Casa en Bogotá
                  price: 200
        '400':
          description: Datos inválidos

  /api/v1/properties/{id}:
    get:
      tags: [Properties]
      summary: Obtener propiedad por ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la propiedad
          schema:
            type: integer
      responses:
        '200':
          description: Propiedad encontrada
          content:
            application/json:
              example:
                success: true
                data:
                  id: 1
                  title: Casa en Medellín
                  price: 250
        '404':
          description: Propiedad no encontrada

    put:
      tags: [Properties]
      summary: Actualizar propiedad completamente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PropertyInput'
      responses:
        '200':
          description: Propiedad actualizada
        '404':
          description: No encontrada

    patch:
      tags: [Properties]
      summary: Actualizar propiedad parcialmente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PropertyInput'
      responses:
        '200':
          description: Propiedad actualizada parcialmente
        '404':
          description: No encontrada

    delete:
      tags: [Properties]
      summary: Eliminar propiedad
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Propiedad eliminada correctamente
        '404':
          description: No encontrada

components:
  schemas:
    Property:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Casa en Cartagena
        price:
          type: number
          example: 300

    PropertyInput:
      type: object
      required:
        - title
        - price
      properties:
        title:
          type: string
          example: Casa en Bogotá
        price:
          type: number
          example: 200
