
openapi: 3.0.0
info:
  title: API Plataforma de Alquiler Vacacional
  description: API para gestión de propiedades en una plataforma de alquiler vacacional
  version: 1.0.0

servers:
  - url: http://localhost:3000

tags:
  - name: Properties
    description: Gestión de propiedades

paths:
  /api/v1/properties:
    get:
      tags: [Properties]
      summary: Listar todas las propiedades
      responses:
        '200':
          description: Lista de propiedades
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyList'

    post:
      tags: [Properties]
      summary: Crear una propiedad
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PropertyInput'
      responses:
        '201':
          description: Propiedad creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyResponse'

  /api/v1/properties/{id}:
    get:
      tags: [Properties]
      summary: Obtener propiedad por ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID de la propiedad
          schema:
            type: integer
      responses:
        '200':
          description: Propiedad encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyResponse'
        '404':
          description: No encontrado

    put:
      tags: [Properties]
      summary: Actualizar propiedad completamente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PropertyInput'
      responses:
        '200':
          description: Propiedad actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyResponse'

    patch:
      tags: [Properties]
      summary: Actualizar propiedad parcialmente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PropertyInput'
      responses:
        '200':
          description: Propiedad actualizada parcialmente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyResponse'

    delete:
      tags: [Properties]
      summary: Eliminar propiedad
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Propiedad eliminada
        '404':
          description: No encontrado

components:
  schemas:
    Property:
      type: object
      properties:
        id:
          type: integer
          example: 123456
        title:
          type: string
          example: Casa en Cartagena
        price:
          type: number
          example: 300

    PropertyInput:
      type: object
      required:
        - title
        - price
      properties:
        title:
          type: string
          example: Casa en Bogotá
        price:
          type: number
          example: 200

    PropertyResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/Property'

    PropertyList:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: '#/components/schemas/Property'
