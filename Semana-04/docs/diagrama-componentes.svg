<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">

  <style>
    .box { fill: #f4f4f4; stroke: #333; stroke-width: 2; rx: 10; }
    .text { font-family: Arial; font-size: 14px; text-anchor: middle; }
    .arrow { stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" 
    refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <rect x="300" y="20" width="200" height="50" class="box"/>
  <text x="400" y="50" class="text">Cliente (Host / Guest / Admin)</text>

  <rect x="300" y="100" width="200" height="50" class="box"/>
  <text x="400" y="130" class="text">Routes</text>

  <rect x="300" y="180" width="200" height="50" class="box"/>
  <text x="400" y="210" class="text">Controllers</text>

  <rect x="300" y="260" width="200" height="50" class="box"/>
  <text x="400" y="290" class="text">Services (Reglas de negocio)</text>

  <rect x="300" y="340" width="200" height="50" class="box"/>
  <text x="400" y="370" class="text">Repositories</text>

  <rect x="300" y="420" width="200" height="50" class="box"/>
  <text x="400" y="450" class="text">Base de Datos</text>

  <line x1="400" y1="70" x2="400" y2="100" class="arrow"/>
  <line x1="400" y1="150" x2="400" y2="180" class="arrow"/>
  <line x1="400" y1="230" x2="400" y2="260" class="arrow"/>
  <line x1="400" y1="310" x2="400" y2="340" class="arrow"/>
  <line x1="400" y1="390" x2="400" y2="420" class="arrow"/>

</svg>
